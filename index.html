<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spiral</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;background:#020810;overflow-x:hidden;font-family:'Space Mono',monospace;color:#fff}
    #bg-video{display:none;}
    #cv{position:fixed;inset:0;z-index:1;pointer-events:none;display:block;}
    #bar{position:fixed;top:0;left:0;height:2px;width:0%;background:rgba(0,220,255,0.7);z-index:300;}
    #wrap{height:1000vh;position:relative;z-index:3;}
    #view{position:sticky;top:0;height:100vh;overflow:hidden;pointer-events:none;}
    #hint{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:5px;text-transform:uppercase;color:rgba(0,220,255,0.30);z-index:20;transition:opacity 0.4s;animation:fadeHint 2s ease-in-out infinite;white-space:nowrap;}
    @keyframes fadeHint{0%,100%{opacity:.2}50%{opacity:.8}}
    #next-section{position:relative;height:100vh;width:100%;background:#020810;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;font-family:'Syne',sans-serif;text-align:center;padding:2rem;border-top:1px solid rgba(0,200,255,0.12);}
    #next-section h2{font-size:clamp(2.5rem,8vw,5rem);font-weight:800;letter-spacing:-0.02em;margin-bottom:1rem;background:linear-gradient(135deg,#00dcff,#7060ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    #next-section p{font-size:clamp(0.85rem,2vw,1.1rem);max-width:580px;opacity:0.45;font-family:'Space Mono',monospace;}
  </style>
</head>
<body>
  <video id="bg-video" src="midVideo.mp4" muted playsinline preload="auto" webkit-playsinline crossorigin="anonymous"></video>
  <canvas id="cv"></canvas>
  <div id="bar"></div>
  <div id="wrap"><div id="view"><div id="hint">scroll to ascend</div></div></div>
  <div id="next-section"><h2>End</h2><p>The journey concludes here.</p></div>

<script>
const CARDS = [
  { num:'01', title:'AI for 1.4 Billion',    sub:"India's most complex human problems are becoming its most ambitious AI experiments that no other nation can match." },
  { num:'02', title:'AI-First Enterprise',    sub:'Tomorrow belongs to enterprises reimagining their core to unlock unprecedented velocity and scale through intelligence.' },
  { num:'03', title:'New Era Leaders',        sub:'A new generation of founders engineering the foundational infrastructure of the coming AI economy.' },
  { num:'04', title:'Sovereign Intelligence', sub:'Nations building their own AI stacks will define geopolitics, economic power and cultural identity for a century.' },
];

/* ═══ VIDEO ═══ */
const vid = document.getElementById('bg-video');
const vidBuf = document.createElement('canvas');
vidBuf.width = 1280; vidBuf.height = 720;
const vCtx = vidBuf.getContext('2d');

let videoReady = false, seekFlight = false;
let targetP = 0, lastSeekP = -1;
const FDUR = 1/30;

vid.addEventListener('loadedmetadata', () => {
  vidBuf.width  = vid.videoWidth  || 1280;
  vidBuf.height = vid.videoHeight || 720;
  videoReady = true; doSeek();
});

function paintVid() {
  if (vid.readyState >= 2) {
    const scale = 1.14;
    const sw = vidBuf.width * scale, sh = vidBuf.height * scale;
    const ox = -(sw - vidBuf.width) / 2;
    const oy = -(sh - vidBuf.height) * 0.18;
    vCtx.drawImage(vid, ox, oy, sw, sh);
    vidTex.needsUpdate = true;
  }
}

vid.addEventListener('seeked', () => { seekFlight = false; paintVid(); doSeek(); });

function doSeek() {
  if (!videoReady || !vid.duration || seekFlight) return;
  if (Math.abs(targetP - lastSeekP) * vid.duration < FDUR) return;
  lastSeekP = targetP; seekFlight = true;
  vid.currentTime = targetP * vid.duration;
}

function startRVFC() {
  if (!('requestVideoFrameCallback' in vid)) return;
  (function f(){ paintVid(); vid.requestVideoFrameCallback(f); })();
}

let vidUnlocked = false;
function unlockVid() {
  if (vidUnlocked) return; vidUnlocked = true;
  const p = vid.play();
  const done = () => { vid.pause(); vid.currentTime = 0; startRVFC(); doSeek(); };
  if (p) p.then(done).catch(done); else done();
}
vid.addEventListener('canplay', unlockVid, { once: true });
['pointerdown','touchstart','scroll'].forEach(e => window.addEventListener(e, unlockVid, { once: true }));
vid.load();

/* ─── THREE.JS ─── */
const canvas = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x020810, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(56, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 10);
camera.lookAt(0, 0, 0);

const isMobile = () => innerWidth < 768;

function getCardDims() {
  if (isMobile()) return { W: 2.6, H: 1.58 };
  return { W: 3.8, H: 2.15 }; /* reduced from 4.5 × 2.55 */
}

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  rebuildVP();
  const { W, H } = getCardDims();
  cardObjs.forEach(({ face }) => {
    face.geometry.dispose();
    face.geometry = new THREE.PlaneGeometry(W, H);
  });
});

const PLANE_Z = 1.5;
const CAM_D   = camera.position.z - PLANE_Z;
const vidTex  = new THREE.CanvasTexture(vidBuf);
vidTex.minFilter = vidTex.magFilter = THREE.LinearFilter;

let vPlane;
function rebuildVP() {
  if (vPlane) { scene.remove(vPlane); vPlane.geometry.dispose(); }
  const h = 2 * Math.tan((56*Math.PI/180)/2) * CAM_D;
  const w = h * (innerWidth/innerHeight) * (isMobile() ? 0.95 : 0.45);
  vPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: vidTex, depthWrite: true, depthTest: true })
  );
  vPlane.position.z = PLANE_Z;
  scene.add(vPlane);
}
rebuildVP();

/* ─── CARD CANVAS ─── */
const CW = 1536, CH = 864;
const GLYPHS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#%<>/\\|?^~*-+=[]{}:.';
const cardState = CARDS.map(() => ({ sp: 0, canvas: null, ctx: null, tex: null }));

function initCard(i) {
  const s = cardState[i];
  s.canvas = document.createElement('canvas');
  s.canvas.width = CW; s.canvas.height = CH;
  s.ctx = s.canvas.getContext('2d');
  s.tex = new THREE.CanvasTexture(s.canvas);
  s.tex.minFilter = s.tex.magFilter = THREE.LinearFilter;
}

function rrPath(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

function scramble(text, sp) {
  return text.split('').map((ch,i) => {
    if (ch === ' ') return ' ';
    return sp > i/text.length ? ch : GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
  }).join('');
}

function wrapLines(c, text, maxW) {
  const words = text.split(' ');
  let line = '', out = [];
  for (const w of words) {
    const t = line ? line+' '+w : w;
    if (c.measureText(t).width > maxW && line) { out.push(line); line = w; }
    else line = t;
  }
  if (line) out.push(line);
  return out;
}

function drawCard(idx, sp) {
  const { ctx: c } = cardState[idx];
  const card = CARDS[idx];
  const mob = isMobile();
  const R = 52;

  c.clearRect(0,0,CW,CH);

  rrPath(c, 0, 0, CW, CH, R);
  c.clip();

  c.fillStyle = 'rgba(2, 7, 20, 0.82)';
  c.fillRect(0, 0, CW, CH);

  const glassFill = c.createLinearGradient(0, 0, CW, CH);
  glassFill.addColorStop(0,   'rgba(8, 28, 80, 0.38)');
  glassFill.addColorStop(0.4, 'rgba(3, 10, 35, 0.20)');
  glassFill.addColorStop(1,   'rgba(1, 4, 16, 0.42)');
  c.fillStyle = glassFill; c.fillRect(0, 0, CW, CH);

  const specGrad = c.createLinearGradient(0, 0, CW*0.55, CH*0.40);
  specGrad.addColorStop(0,    'rgba(255,255,255,0.28)');
  specGrad.addColorStop(0.12, 'rgba(210,235,255,0.14)');
  specGrad.addColorStop(0.35, 'rgba(160,210,255,0.05)');
  specGrad.addColorStop(1,    'rgba(0,0,0,0)');
  c.fillStyle = specGrad; c.fillRect(0, 0, CW, CH);

  const topBevel = c.createLinearGradient(0, 0, 0, CH*0.07);
  topBevel.addColorStop(0, 'rgba(200,230,255,0.62)');
  topBevel.addColorStop(1, 'rgba(0,60,180,0)');
  c.fillStyle = topBevel; c.fillRect(0, 0, CW, CH*0.07);

  const leftBevel = c.createLinearGradient(0, 0, CW*0.032, 0);
  leftBevel.addColorStop(0, 'rgba(180,220,255,0.35)');
  leftBevel.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = leftBevel; c.fillRect(0, 0, CW*0.032, CH);

  const botShadow = c.createLinearGradient(0, CH*0.65, 0, CH);
  botShadow.addColorStop(0, 'rgba(0,0,0,0)');
  botShadow.addColorStop(1, 'rgba(0,2,12,0.88)');
  c.fillStyle = botShadow; c.fillRect(0, 0, CW, CH);

  const rigShadow = c.createLinearGradient(CW*0.78, 0, CW, 0);
  rigShadow.addColorStop(0, 'rgba(0,0,0,0)');
  rigShadow.addColorStop(1, 'rgba(0,2,12,0.70)');
  c.fillStyle = rigShadow; c.fillRect(0, 0, CW, CH);

  const frosted = c.createRadialGradient(CW*0.35,CH*0.30,0,CW*0.5,CH*0.5,CW*0.50);
  frosted.addColorStop(0, 'rgba(60,120,255,0.07)');
  frosted.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = frosted; c.fillRect(0, 0, CW, CH);

  c.save();
  rrPath(c, 2, 2, CW-4, CH-4, R-2);
  c.shadowColor = 'rgba(80,180,255,0.70)'; c.shadowBlur = 44;
  const borderGrad = c.createLinearGradient(0, 0, CW, CH);
  borderGrad.addColorStop(0,    'rgba(230,245,255,0.95)');
  borderGrad.addColorStop(0.15, 'rgba(130,195,255,0.78)');
  borderGrad.addColorStop(0.45, 'rgba(50,110,220,0.28)');
  borderGrad.addColorStop(0.75, 'rgba(90,150,245,0.50)');
  borderGrad.addColorStop(1,    'rgba(210,235,255,0.85)');
  c.strokeStyle = borderGrad; c.lineWidth = 3; c.stroke();
  c.shadowBlur = 0; c.restore();

  c.save();
  rrPath(c, 7, 7, CW-14, CH-14, R-7);
  c.strokeStyle = 'rgba(255,255,255,0.07)'; c.lineWidth = 1; c.stroke();
  c.restore();

  [[R,R],[CW-R,R],[CW-R,CH-R],[R,CH-R]].forEach(([cx,cy]) => {
    const g2 = c.createRadialGradient(cx,cy,0,cx,cy,R*0.6);
    g2.addColorStop(0,'rgba(210,240,255,0.22)'); g2.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g2; c.fillRect(0,0,CW,CH);
  });

  const PX      = mob ? CW * 0.080 : CW * 0.060;
  const PY      = mob ? CH * 0.115 : CH * 0.135;
  const IW      = CW - PX * 2;

  const BOX_SZ  = mob ? CH * 0.165 : CH * 0.20;
  const BOX_X   = PX;
  const BOX_Y   = PY;

  c.fillStyle = '#1462FF';
  c.beginPath(); c.roundRect(BOX_X, BOX_Y, BOX_SZ, BOX_SZ, 8); c.fill();

  const badgeHL = c.createLinearGradient(BOX_X, BOX_Y, BOX_X, BOX_Y + BOX_SZ*0.55);
  badgeHL.addColorStop(0,'rgba(255,255,255,0.22)'); badgeHL.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle = badgeHL;
  c.beginPath(); c.roundRect(BOX_X, BOX_Y, BOX_SZ, BOX_SZ, 8); c.fill();

  const numFs = BOX_SZ * 0.48;
  c.font = `700 ${numFs}px "Space Mono",monospace`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = '#ffffff';
  c.fillText(scramble(card.num, sp), BOX_X + BOX_SZ/2, BOX_Y + BOX_SZ/2 + numFs*0.04);
  c.textBaseline = 'alphabetic';

  const TITLE_X    = BOX_X + BOX_SZ + CW * (mob ? 0.025 : 0.030);
  const TITLE_MAX  = CW - TITLE_X - PX;
  const TITLE_START = mob ? CH * 0.110 : CH * 0.148;
  const TITLE_MIN   = mob ? CH * 0.055 : CH * 0.065;

  let tFs = TITLE_START;
  c.font = `800 ${tFs}px "Syne",sans-serif`;
  while (c.measureText(card.title).width > TITLE_MAX && tFs > TITLE_MIN) {
    tFs -= 2; c.font = `800 ${tFs}px "Syne",sans-serif`;
  }
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.shadowColor = 'rgba(100,190,255,0.38)'; c.shadowBlur = 20;
  c.fillStyle = 'rgba(255,255,255,0.97)';
  c.fillText(scramble(card.title, sp), TITLE_X, BOX_Y + BOX_SZ/2 + tFs*0.04);
  c.shadowBlur = 0; c.textBaseline = 'alphabetic';

  const SUB_GAP    = mob ? CH * 0.055 : CH * 0.072;
  const SUB_Y_TOP  = BOX_Y + BOX_SZ + SUB_GAP;
  const SUB_BOTTOM = mob ? CH * 0.075 : CH * 0.09;
  const SUB_AVAIL  = CH - SUB_Y_TOP - SUB_BOTTOM;
  const SUB_START  = mob ? CH * 0.056 : CH * 0.052; /* mobile bumped up from 0.044 */
  const SUB_MIN    = mob ? CH * 0.030 : CH * 0.026;

  let sFs = SUB_START;
  let sLines;
  for(;;){
    c.font = mob
      ? `400 ${sFs}px "Syne",sans-serif`
      : `300 ${sFs}px "Syne",sans-serif`; /* desktop weight: 300 (light) */
    sLines = wrapLines(c, card.sub, IW * 0.93);
    if(sFs <= SUB_MIN || sLines.length * sFs * 1.58 <= SUB_AVAIL) break;
    sFs -= 1.5;
  }
  c.font = mob
    ? `400 ${sFs}px "Syne",sans-serif`
    : `300 ${sFs}px "Syne",sans-serif`;
  c.fillStyle = 'rgba(195,225,255,0.80)';
  c.textAlign = 'center';
  const lh = sFs * 1.58;
 sLines.forEach((l,i) => c.fillText(l, CW / 2, SUB_Y_TOP + sFs + i*lh));
}

/* ─── SPIRAL ─── */
const CARD_SPACING  = 1.8;
const SPIRAL_RADIUS = 5.0;
const ANGLE_FACTOR  = 0.7;
const FADE_RANGE    = 1.5;

/* Delay first card appearance */
const INITIAL_OFFSET = CARD_SPACING * 0.8;
const TOTAL_RISE     = (CARDS.length - 1) * CARD_SPACING + INITIAL_OFFSET + CARD_SPACING;
const baseYArr       = CARDS.map((_,i) => -i * CARD_SPACING - INITIAL_OFFSET);

const helixGroup = new THREE.Group(); scene.add(helixGroup);
const cardObjs   = [];

CARDS.forEach((_,i) => {
  initCard(i); drawCard(i,0);
  const { W, H } = getCardDims();
  const pivot = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({
    map: cardState[i].tex, transparent: true, opacity: 0,
    side: THREE.DoubleSide, depthWrite: false, depthTest: true
  });
  const face = new THREE.Mesh(new THREE.PlaneGeometry(W, H), mat);
  face.renderOrder = 1;
  pivot.add(face);
  helixGroup.add(pivot);
  cardObjs.push({ pivot, mat, baseY: baseYArr[i], idx: i, face });
});

/* particles */
const pGeo=new THREE.BufferGeometry();
const pN=500, pP=new Float32Array(pN*3), pC=new Float32Array(pN*3);
for(let i=0;i<pN;i++){
  pP[i*3]=(Math.random()-.5)*35; pP[i*3+1]=(Math.random()-.5)*22; pP[i*3+2]=(Math.random()-.5)*35;
  pC[i*3]=0; pC[i*3+1]=0.7+Math.random()*0.3; pC[i*3+2]=1;
}
pGeo.setAttribute('position',new THREE.Float32BufferAttribute(pP,3));
pGeo.setAttribute('color',new THREE.Float32BufferAttribute(pC,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({vertexColors:true,size:0.016,transparent:true,opacity:0.32,sizeAttenuation:true})));

scene.add(new THREE.AmbientLight(0x002244,1.2));
const fL=new THREE.DirectionalLight(0x00ccff,1.1); fL.position.set(2,3,10); scene.add(fL);
const bL=new THREE.PointLight(0x0044ff,1.6,22); bL.position.set(-3,1,-8); scene.add(bL);

/* ─── LENIS + SCROLL ─── */
gsap.registerPlugin(ScrollTrigger);
const lenis=new Lenis({duration:1.2,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t))});
lenis.on('scroll',ScrollTrigger.update);
gsap.ticker.add(t=>lenis.raf(t*1000));
gsap.ticker.lagSmoothing(0);

let rawP=0;
ScrollTrigger.create({
  trigger:'#wrap', start:'top top', end:'bottom bottom', scrub:1.5,
  onUpdate: self => {
    rawP = self.progress;
    document.getElementById('bar').style.width=(rawP*100)+'%';
    cardObjs.forEach(({pivot,mat,baseY:by,idx}) => {
      const y=by+rawP*TOTAL_RISE, angle=-y*ANGLE_FACTOR;
      pivot.position.set(Math.sin(angle)*SPIRAL_RADIUS, y, Math.cos(angle)*SPIRAL_RADIUS);
      pivot.rotation.y=angle; pivot.rotation.x=Math.sin(y*0.5)*0.1;
      const op=Math.pow(Math.max(0,1-Math.abs(y)/FADE_RANGE),2.5);
      mat.opacity=op*0.94;
      pivot.scale.setScalar(1+op*0.06); pivot.visible=op>0.01;
      const s=cardState[idx];
      if(op>0.04) s.sp=Math.min(1,s.sp+0.022);
      else        s.sp=Math.max(0,s.sp-0.06);
    });
    targetP=rawP; doSeek();
    document.getElementById('hint').style.opacity=rawP>0.03?'0':'1';
  }
});

let tk=0,fc=0;
(function loop(){
  requestAnimationFrame(loop);
  tk+=0.005; fc++;
  if(fc%2===0){
    cardObjs.forEach(({mat,idx})=>{
      const s=cardState[idx];
      if(s.sp>0.001){ drawCard(idx,s.sp); s.tex.needsUpdate=true; mat.map=s.tex; }
    });
  }
  camera.position.y=0.5+Math.sin(tk*0.2)*0.1;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
})();

document.fonts.ready.then(()=>cardObjs.forEach(({idx})=>drawCard(idx,cardState[idx].sp)));
</script>
</body>
</html>
